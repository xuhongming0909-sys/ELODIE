<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="1000" fill="#F5F9FC"/>
  <text x="80" y="90" fill="#102131" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">Workflow Map</text>
  <text x="80" y="130" fill="#466174" font-family="Segoe UI, Arial, sans-serif" font-size="22">How AI enters a project, reads rules, creates tasks, and closes the loop</text>

  <rect x="80" y="190" width="280" height="120" rx="22" fill="#0C1B28"/>
  <text x="112" y="242" fill="#8EE6FF" font-family="Consolas, monospace" font-size="24">AGENT.md / CLAUDE.md</text>
  <text x="112" y="278" fill="#D7E6F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">AI reads long-term rules and workflow first</text>

  <rect x="420" y="190" width="280" height="120" rx="22" fill="#123048"/>
  <text x="452" y="242" fill="#A8F0FF" font-family="Consolas, monospace" font-size="24">specs/spec.md</text>
  <text x="452" y="278" fill="#D7E6F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Project truth and module map</text>

  <rect x="760" y="190" width="280" height="120" rx="22" fill="#123048"/>
  <text x="792" y="242" fill="#A8F0FF" font-family="Consolas, monospace" font-size="24">specs/*.md</text>
  <text x="792" y="278" fill="#D7E6F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Module specs, formulas, APIs, and contracts</text>

  <rect x="1100" y="190" width="220" height="120" rx="22" fill="#123048"/>
  <text x="1140" y="242" fill="#A8F0FF" font-family="Consolas, monospace" font-size="24">MEMORY.md</text>
  <text x="1140" y="278" fill="#D7E6F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Recent handoff memory</text>

  <rect x="230" y="420" width="340" height="140" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="266" y="474" fill="#112536" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Non-chat tasks</text>
  <text x="266" y="516" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">implement / review / analysis / requirement updates</text>

  <rect x="620" y="420" width="560" height="140" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="656" y="474" fill="#112536" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">missions/MMDD-short-name/</text>
  <text x="656" y="516" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">spec.md defines scope, plan.md defines steps and validation</text>

  <rect x="80" y="690" width="300" height="180" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="114" y="744" fill="#112536" font-family="Consolas, monospace" font-size="24">templates/</text>
  <text x="114" y="788" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Reference structure, not mandatory literal text</text>
  <text x="114" y="822" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Split or compress once a file approaches 500 lines</text>

  <rect x="430" y="690" width="300" height="180" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="464" y="744" fill="#112536" font-family="Consolas, monospace" font-size="24">templates/subagents/</text>
  <text x="464" y="788" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Reusable subagent templates</text>
  <text x="464" y="822" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Define boundaries, write scope, and parallel conflicts</text>

  <rect x="780" y="690" width="300" height="180" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="814" y="744" fill="#112536" font-family="Consolas, monospace" font-size="24">config/</text>
  <text x="814" y="788" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">config.yaml + secrets.yaml</text>
  <text x="814" y="822" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Centralized config, no secrets in markdown</text>

  <rect x="1130" y="690" width="190" height="180" rx="22" fill="#FFFFFF" stroke="#B5C9D9" stroke-width="3"/>
  <text x="1162" y="744" fill="#112536" font-family="Consolas, monospace" font-size="24">scripts/</text>
  <text x="1162" y="788" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Trim tasks</text>
  <text x="1162" y="822" fill="#4C677B" font-family="Segoe UI, Arial, sans-serif" font-size="22">Maintain memory</text>

  <path d="M360 250H420" stroke="#587890" stroke-width="4"/>
  <path d="M700 250H760" stroke="#587890" stroke-width="4"/>
  <path d="M1040 250H1100" stroke="#587890" stroke-width="4"/>
  <path d="M360 310L390 420" stroke="#587890" stroke-width="4"/>
  <path d="M760 310L840 420" stroke="#587890" stroke-width="4"/>
  <path d="M900 560V690" stroke="#587890" stroke-width="4"/>
</svg>
