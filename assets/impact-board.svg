<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#09111A"/>
  <rect x="48" y="48" width="1504" height="804" rx="34" fill="url(#bg)" stroke="#274053"/>

  <text x="96" y="124" fill="#DFF6FF" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800">From chat chaos to project control</text>
  <text x="96" y="168" fill="#89A9BE" font-family="Segoe UI, Arial, sans-serif" font-size="26">Same AI. Different operating system.</text>

  <rect x="96" y="220" width="644" height="552" rx="28" fill="#0D1822" stroke="#2C4457"/>
  <rect x="860" y="220" width="644" height="552" rx="28" fill="#101F2C" stroke="#58CDE9"/>

  <rect x="128" y="256" width="190" height="40" rx="20" fill="#2A1820"/>
  <text x="164" y="282" fill="#FF9DB3" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">CHAT ONLY MODE</text>

  <rect x="892" y="256" width="216" height="40" rx="20" fill="#113246"/>
  <text x="930" y="282" fill="#8EE6FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">WORKFLOW MODE</text>

  <rect x="128" y="334" width="580" height="80" rx="18" fill="#161F29"/>
  <text x="158" y="382" fill="#FFE8EE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Requirements buried in chat</text>

  <rect x="128" y="438" width="580" height="80" rx="18" fill="#161F29"/>
  <text x="158" y="486" fill="#FFE8EE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">API, UI, and formulas drift apart</text>

  <rect x="128" y="542" width="580" height="80" rx="18" fill="#161F29"/>
  <text x="158" y="590" fill="#FFE8EE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">New model loses context instantly</text>

  <rect x="128" y="646" width="580" height="80" rx="18" fill="#161F29"/>
  <text x="158" y="694" fill="#FFE8EE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Tasks feel active but never close</text>

  <circle cx="1250" cy="376" r="24" fill="#7CE2FF"/>
  <text x="1241" y="384" fill="#08202B" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">1</text>
  <rect x="930" y="334" width="500" height="84" rx="18" fill="#0C1721" stroke="#335B71"/>
  <text x="972" y="372" fill="#8EE6FF" font-family="Consolas, monospace" font-size="26">AGENT.md / CLAUDE.md</text>
  <text x="972" y="402" fill="#D8ECF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Long-term rules, workflow, constitution</text>

  <circle cx="1250" cy="500" r="24" fill="#7CE2FF"/>
  <text x="1241" y="508" fill="#08202B" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">2</text>
  <rect x="930" y="458" width="500" height="84" rx="18" fill="#0C1721" stroke="#335B71"/>
  <text x="972" y="496" fill="#8EE6FF" font-family="Consolas, monospace" font-size="26">specs/ + missions/</text>
  <text x="972" y="526" fill="#D8ECF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Formal truth plus scoped task closure</text>

  <circle cx="1250" cy="624" r="24" fill="#7CE2FF"/>
  <text x="1241" y="632" fill="#08202B" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">3</text>
  <rect x="930" y="582" width="500" height="84" rx="18" fill="#0C1721" stroke="#335B71"/>
  <text x="972" y="620" fill="#8EE6FF" font-family="Consolas, monospace" font-size="26">MEMORY.md + templates/</text>
  <text x="972" y="650" fill="#D8ECF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">Handoff memory and reusable structure</text>

  <rect x="930" y="694" width="500" height="48" rx="14" fill="#7CE2FF"/>
  <text x="1044" y="725" fill="#08202B" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Human keeps control. AI keeps momentum.</text>

  <defs>
    <linearGradient id="bg" x1="48" y1="48" x2="1552" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101A24"/>
      <stop offset="1" stop-color="#0B1520"/>
    </linearGradient>
  </defs>
</svg>
