<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0D1117"/>
  <rect x="60" y="60" width="1480" height="780" rx="32" fill="url(#bg)"/>
  <rect x="110" y="122" width="1380" height="656" rx="24" fill="#081018" stroke="#2F455C"/>
  <rect x="150" y="168" width="220" height="42" rx="21" fill="#132536"/>
  <text x="182" y="196" fill="#8CD9FF" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">Coding Workflow 4 Agent</text>
  <text x="150" y="300" fill="#F6FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">Give Claude and Codex</text>
  <text x="150" y="382" fill="#F6FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="68" font-weight="800">a real operating system.</text>
  <text x="150" y="458" fill="#9FB7CC" font-family="Segoe UI, Arial, sans-serif" font-size="30">A project workflow built specifically for AI coding.</text>
  <text x="150" y="502" fill="#9FB7CC" font-family="Segoe UI, Arial, sans-serif" font-size="30">Even non-coders can control scope, progress, rules, and boundaries.</text>

  <rect x="150" y="580" width="262" height="70" rx="18" fill="#7CE2FF"/>
  <text x="190" y="624" fill="#03111B" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="800">npx coding-workflow-4-agent</text>
  <rect x="432" y="580" width="196" height="70" rx="18" fill="#16293C" stroke="#7CE2FF"/>
  <text x="484" y="624" fill="#DDF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">cw4a init</text>

  <g opacity="0.98">
    <rect x="980" y="180" width="380" height="110" rx="22" fill="#0E1D2A" stroke="#33526E"/>
    <text x="1010" y="228" fill="#88E6FF" font-family="Consolas, monospace" font-size="22">AGENT.md / CLAUDE.md</text>
    <text x="1010" y="262" fill="#D8E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Long-term rules, AI constitution, workflow entrypoint</text>

    <rect x="980" y="320" width="380" height="110" rx="22" fill="#0E1D2A" stroke="#33526E"/>
    <text x="1010" y="368" fill="#88E6FF" font-family="Consolas, monospace" font-size="22">specs/ + missions/</text>
    <text x="1010" y="402" fill="#D8E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Formal requirements + single-task closure</text>

    <rect x="980" y="460" width="380" height="110" rx="22" fill="#0E1D2A" stroke="#33526E"/>
    <text x="1010" y="508" fill="#88E6FF" font-family="Consolas, monospace" font-size="22">templates/ + subagents/</text>
    <text x="1010" y="542" fill="#D8E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Templates, examples, reusable subagent boundaries</text>

    <rect x="980" y="600" width="380" height="110" rx="22" fill="#0E1D2A" stroke="#33526E"/>
    <text x="1010" y="648" fill="#88E6FF" font-family="Consolas, monospace" font-size="22">config/ + MEMORY.md</text>
    <text x="1010" y="682" fill="#D8E7F2" font-family="Segoe UI, Arial, sans-serif" font-size="20">Centralized config + recent handoff memory</text>
  </g>

  <defs>
    <linearGradient id="bg" x1="60" y1="60" x2="1540" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111A24"/>
      <stop offset="1" stop-color="#142535"/>
    </linearGradient>
  </defs>
