#
# Usage Rules:
# 1. A single file must stay under 500 lines.
# 2. Templates are reference material, not a requirement to keep every key literally.
# 3. Keep only the configuration that the current project actually needs.
#
project:
  name: "[project_name]"
  summary: "[one_line_summary]"
  stage: "[draft|active|paused|archived]"

workflow:
  mission_retention: 30
  memory_retention: 50
  mission_name_pattern: "MMDD-short-name"
  create_mission_for_non_chat_tasks: true
  sync_formal_specs_before_requirement_changes: true
  non_code_language: "zh-CN"
  allow_add_template_only: true

paths:
  formal_spec_root: "specs"
  mission_root: "missions"
  template_root: "templates"
  config_root: "config"

runtime:
  environment: "[local|dev|test|prod]"
  timezone: "[Asia/Shanghai]"
  default_language: "[zh-CN]"

integrations:
  primary_api_base_url: ""
  dashboard_url: ""

# Example:
# project:
#   name: "alpha_monitor"
#   summary: "Discover arbitrage opportunities from real market data and push them out"
#   stage: "active"
